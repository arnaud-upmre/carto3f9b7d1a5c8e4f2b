<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>➕ Ajouter un appareil</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <style>
    *,*::before,*::after{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{
      margin:0; padding:16px;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      background:var(--bg); color:var(--fg);
      line-height:1.4;
    }
    :root{
      --bg:#f7f7f8; --fg:#202124; --card:#fff; --border:#d0d7de;
      --accent:#007aff; --accent-ink:#fff; --muted:#666; --error:#e53935;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0b0b0b; --fg:#eceff1; --card:#141414; --border:#2a2a2a;
        --accent:#5aa3ff; --accent-ink:#081018; --muted:#999; --error:#ff6b6b;
      }
    }

    h2{text-align:center;font-size:22px;margin:0 0 20px}
    .section-title{font-size:15px;font-weight:600;margin:24px 0 8px;color:var(--muted)}
    .card{max-width:640px;margin:auto;background:var(--card);padding:20px;
      border-radius:16px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
    form{display:flex;flex-direction:column;gap:20px}

    label{display:block;font-size:15px;font-weight:600;margin-bottom:6px}
    input,textarea{
      width:100%;padding:14px;font-size:16px;
      border:1.5px solid var(--border);border-radius:12px;
      background:var(--card);color:var(--fg);min-height:48px;
      transition:border .2s, background .2s;
    }
    input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,122,255,.15)}
    textarea{min-height:96px;resize:none;overflow:auto}
    ::placeholder{color:var(--muted);opacity:.8}

    .hint{font-size:13px;color:var(--muted);margin-top:2px}
    .pill-group{display:flex;border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
    .pill{flex:1;text-align:center;padding:12px;font-size:15px;cursor:pointer;background:var(--card);color:var(--fg)}
    .pill.active{background:var(--accent);color:var(--accent-ink);font-weight:600}

    .map-wrap{display:none;border:1.5px solid var(--border);
      border-radius:12px;overflow:hidden}
    #mapDevice,#mapAccess{height:280px;width:100%}
    .map-toolbar{display:flex;gap:8px;padding:8px;background:var(--card)}
    .map-toolbar button{flex:1;padding:10px;border-radius:8px;
      border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:15px}
    .map-toolbar button:active{background:var(--accent);color:var(--accent-ink)}

    .btn-row{display:flex;flex-direction:column;gap:12px;margin-top:10px}
    .btn{padding:14px;font-size:16px;border:none;border-radius:12px;cursor:pointer}
    .btn.primary{background:var(--accent);color:var(--accent-ink);font-weight:600}
    .btn.secondary{background:transparent;color:var(--fg);border:1.5px solid var(--border)}

    /* Styles erreurs */
    input.error, textarea.error {
      border-color: var(--error) !important;
      background-color: rgba(229,57,53,.08);
    }
    .error-msg {
      color: var(--error);
      font-size: 13px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h2>➕ Ajouter un appareil</h2>

  <div class="card">
    <form id="formAppareil">
      <div>
        <label>Demandeur *</label>
        <input id="demandeur" required>
      </div>

      <div>
        <label>Poste *</label>
        <input id="poste">
      </div>

      <div>
        <label>SAT (optionnel)</label>
        <input id="sat" placeholder="Ex : SAT1, SAT2…">
      </div>

      <div>
        <label>Nom de l’appareil *</label>
        <input id="appareil" placeholder="Ex : I7112" required>
      </div>

      <div>
        <div class="section-title">🛰️ Localisation de l’appareil</div>
        <label>Géolocaliser automatiquement ?</label>
        <div class="hint">Vous pouvez déplacer le marqueur pour ajuster la position.</div>
        <div class="pill-group">
          <div class="pill" id="pill-oui" data-value="oui">Oui</div>
          <div class="pill" id="pill-non" data-value="non">Non</div>
        </div>
        <input type="hidden" id="presentValue">
      </div>

      <div class="map-wrap" id="mapDeviceWrap">
        <div id="mapDevice"></div>
        <div class="map-toolbar">
          <button type="button" id="btnRecenterDevice">🎯 Ma position</button>
          <button type="button" id="btnToggleDevice">🗺️ Plan</button>
        </div>
      </div>

      <div id="coordsDevice" style="display:none;">
        <label>Latitude</label>
        <input id="latDevice" inputmode="decimal">
        <label>Longitude</label>
        <input id="lonDevice" inputmode="decimal">
      </div>

      <div id="lienField" style="display:none;">
        <label>Lien Google Maps</label>
        <input id="lien" type="url" placeholder="https://maps.app.goo.gl/…">
      </div>

      <div>
        <div class="section-title">🚪 Accès</div>
        <label>L’appareil a un accès distinct ?</label>
        <div class="pill-group">
          <div class="pill" id="pill-acces-oui" data-value="oui">Oui</div>
          <div class="pill" id="pill-acces-non" data-value="non">Non</div>
        </div>
        <input type="hidden" id="accessValue">
      </div>

      <div class="map-wrap" id="mapAccessWrap">
        <div id="mapAccess"></div>
        <div class="map-toolbar">
          <button type="button" id="btnRecenterAccess">🎯 Ma position</button>
          <button type="button" id="btnToggleAccess">🗺️ Plan</button>
        </div>
      </div>

      <div id="coordsAccess" style="display:none;">
        <label>Latitude accès</label>
        <input id="latAccess" inputmode="decimal">
        <label>Longitude accès</label>
        <input id="lonAccess" inputmode="decimal">
      </div>

      <div id="lienAccessField" style="display:none;">
        <label>Lien Google Maps de l’accès (optionnel)</label>
        <input id="lienAccess" type="url" placeholder="https://maps.app.goo.gl/…">
        <div class="hint">Indiquez soit les coordonnées GPS de l’accès, soit un lien Google Maps valide.</div>
      </div>

      <div>
        <label>Notes complémentaires</label>
        <textarea id="infos" placeholder="Repère visuel, portail, etc."></textarea>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn primary">📩 Envoyer la contribution</button>
        <button type="button" class="btn secondary" onclick="location.href='index.html'">⬅️ Retour</button>
      </div>
    </form>
  </div>

  <script>
    const DEST_EMAIL = "arnaud.debaecker@sncf.fr";

    function $(id){return document.getElementById(id);}
    function toggle(el,show){el.style.display=show?"block":"none";}
    function sanitizeCoord(v){return (v||"").toString().replace(",",".");}
    function isValidLatLon(lat,lon){
      const la=parseFloat(lat),lo=parseFloat(lon);
      return !isNaN(la)&&!isNaN(lo)&&la>=-90&&la<=90&&lo>=-180&&lo<=180;
    }
    function isValidUrl(str){return /^https?:\/\/.+/i.test((str||"").trim());}

    // Erreurs visuelles
    function showError(el, msg) {
      el.classList.add("error");
      let m = document.createElement("div");
      m.className = "error-msg";
      m.textContent = msg;
      if (!el.nextElementSibling || !el.nextElementSibling.classList.contains("error-msg")) {
        el.parentNode.insertBefore(m, el.nextSibling);
      }
    }
    function clearErrors() {
      document.querySelectorAll(".error").forEach(e => e.classList.remove("error"));
      document.querySelectorAll(".error-msg").forEach(e => e.remove());
    }

    // Pills
    $("pill-oui").onclick=()=>setPill("oui");
    $("pill-non").onclick=()=>setPill("non");
    function setPill(v){
      $("presentValue").value=v;
      $("pill-oui").classList.toggle("active",v==="oui");
      $("pill-non").classList.toggle("active",v==="non");
      if(v==="oui"){ toggle($("mapDeviceWrap"),1);toggle($("coordsDevice"),1);toggle($("lienField"),0);}
      else{toggle($("mapDeviceWrap"),0);toggle($("coordsDevice"),0);toggle($("lienField"),1);}
    }
    $("pill-acces-oui").onclick=()=>setAccess("oui");
    $("pill-acces-non").onclick=()=>setAccess("non");
    function setAccess(v){
      $("accessValue").value=v;
      $("pill-acces-oui").classList.toggle("active",v==="oui");
      $("pill-acces-non").classList.toggle("active",v==="non");
      if(v==="oui"){ toggle($("mapAccessWrap"),1);toggle($("coordsAccess"),1);toggle($("lienAccessField"),1);}
      else{toggle($("mapAccessWrap"),0);toggle($("coordsAccess"),0);toggle($("lienAccessField"),0);}
    }

    // Submit
    $("formAppareil").onsubmit=e=>{
      e.preventDefault();
      clearErrors();

      let demandeur=$("demandeur").value.trim();
      let poste=$("poste").value.trim();
      let appareil=$("appareil").value.trim();
      let infos=$("infos").value.trim();
      let ok = true;

      if(!demandeur){showError($("demandeur"),"Ce champ est obligatoire.");ok=false;}
      if(!poste){showError($("poste"),"Ce champ est obligatoire.");ok=false;}
      if(!appareil){showError($("appareil"),"Ce champ est obligatoire.");ok=false;}

      if(!ok){
        alert("⚠️ Merci de renseigner tous les champs obligatoires.");
        return;
      }

      if(!$("presentValue").value){
        alert("⚠️ Merci d’indiquer si vous souhaitez géolocaliser l’appareil ou fournir un lien.");
        return;
      }
      if(!$("accessValue").value){
        alert("⚠️ Merci d’indiquer si l’appareil a son propre accès (Oui / Non).");
        return;
      }

      // Suite normale → génération e-mail (inchangée chez toi)
      let subject=`Contribution : ajout d’un appareil au poste de ${poste}`;
      let body=`Bonjour,%0D%0A%0D%0A${demandeur} propose l’ajout de l’appareil suivant :%0D%0A%0D%0A`
        +`Poste : ${poste}%0D%0A`
        +`SAT : ${$("sat").value.trim()}%0D%0A`
        +`Appareil : ${appareil}%0D%0A`
        +`Notes : ${infos}%0D%0A%0D%0A`
        +`Cordialement,%0D%0A${demandeur}`;
      location.href=`mailto:${DEST_EMAIL}?subject=${encodeURIComponent(subject)}&body=${body}`;

      alert("L’e-mail de contribution est généré, vérifiez et envoyez-le.");
    };
  </script>
</body>
</html>

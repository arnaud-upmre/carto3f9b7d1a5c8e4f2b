<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>➕ Ajouter un appareil</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <style>
    *,*::before,*::after{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{
      margin:0; padding:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg); color:var(--fg);
    }
    :root{
      --bg:#f7f7f8; --fg:#202124; --card:#fff; --border:#d0d7de;
      --accent:#0b6cff; --accent-ink:#fff; --muted:#666;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0b0b0b; --fg:#eceff1; --card:#141414; --border:#2a2a2a;
        --accent:#5aa3ff; --accent-ink:#081018; --muted:#999;
      }
    }

    .step {
      display:none;
      min-height:100vh;
      padding:24px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }
    .step.active{display:flex}
    h2{margin-bottom:16px}
    input, textarea{
      width:100%;
      padding:12px;
      font-size:16px;
      border:1px solid var(--border);
      border-radius:10px;
      background:var(--card);
      color:var(--fg);
      margin-bottom:16px;
    }
    textarea{min-height:96px;resize:none}

    .btn{
      padding:14px;
      margin:6px 0;
      font-size:16px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      width:100%;
    }
    .btn.primary{background:var(--accent);color:var(--accent-ink)}
    .btn.secondary{background:#ccc}
    @media(prefers-color-scheme:dark){
      .btn.secondary{background:#2a2f36;color:#eee}
    }

    .pill-group{display:flex;gap:10px;margin:12px 0;width:100%}
    .pill{
      flex:1;text-align:center;padding:12px;
      border:1px solid var(--border);
      border-radius:999px;cursor:pointer;
    }
    .pill.active{background:var(--accent);color:var(--accent-ink)}

    #mapDevice,#mapAccess{height:300px;width:100%;border-radius:10px;margin:12px 0}

    .progress{
      position:absolute;top:0;left:0;width:100%;height:6px;
      background:var(--border);
    }
    .progress-bar{
      height:100%;background:var(--accent);width:0%;transition:width .3s;
    }

    input.error,textarea.error{border:2px solid red;background:#ffecec}
  </style>
</head>
<body>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

  <!-- Step 0 accueil -->
  <div class="step active" id="step0">
    <h2>➕ Ajouter un appareil</h2>
    <p>La procédure dure environ 30 secondes</p>
    <button class="btn primary" onclick="nextStep()">COMMENCER</button>
  </div>

  <!-- Step 1 demandeur -->
  <div class="step" id="step1">
    <h2>👤 Votre nom</h2>
    <input id="demandeur" placeholder="Entrez votre nom" required>
    <button class="btn primary" onclick="nextStep()">Suivant</button>
  </div>

  <!-- Step 2 poste -->
  <div class="step" id="step2">
    <h2>📌 Poste</h2>
    <input id="poste" placeholder="Nom du poste" required>
    <button class="btn primary" onclick="nextStep()">Suivant</button>
    <button class="btn secondary" onclick="prevStep()">Retour</button>
  </div>

  <!-- Step 3 SAT -->
  <div class="step" id="step3">
    <h2>📌 SAT (optionnel)</h2>
    <input id="sat" placeholder="Ex : SAT1, SAT2…">
    <button class="btn primary" onclick="nextStep()">Suivant</button>
    <button class="btn secondary" onclick="prevStep()">Retour</button>
  </div>

  <!-- Step 4 appareil -->
  <div class="step" id="step4">
    <h2>💡 Nom de l’appareil</h2>
    <input id="appareil" placeholder="Ex : I7112" required>
    <button class="btn primary" onclick="nextStep()">Suivant</button>
    <button class="btn secondary" onclick="prevStep()">Retour</button>
  </div>

  <!-- Step 5 choix localisation -->
  <div class="step" id="step5">
    <h2>📍 Localiser l’appareil ?</h2>
    <div class="pill-group">
      <div class="pill" id="pill-oui" onclick="setPill('oui')">Oui</div>
      <div class="pill" id="pill-non" onclick="setPill('non')">Non</div>
    </div>
    <div id="blocMap" style="display:none">
      <div id="mapDevice"></div>
    </div>
    <div id="blocLien" style="display:none">
      <input id="lien" type="url" placeholder="https://maps.app.goo.gl/...">
    </div>
    <button class="btn primary" onclick="nextStep()">Suivant</button>
    <button class="btn secondary" onclick="prevStep()">Retour</button>
  </div>

  <!-- Step 6 accès -->
  <div class="step" id="step6">
    <h2>📍 L’appareil a un accès distinct ?</h2>
    <div class="pill-group">
      <div class="pill" id="pill-acces-oui" onclick="setAccess('oui')">Oui</div>
      <div class="pill" id="pill-acces-non" onclick="setAccess('non')">Non</div>
    </div>
    <div id="blocAccess" style="display:none">
      <div id="mapAccess"></div>
      <input id="lienAccess" type="url" placeholder="Lien Google Maps (optionnel)">
    </div>
    <button class="btn primary" onclick="nextStep()">Suivant</button>
    <button class="btn secondary" onclick="prevStep()">Retour</button>
  </div>

  <!-- Step 7 infos -->
  <div class="step" id="step7">
    <h2>📝 Notes complémentaires</h2>
    <textarea id="infos" placeholder="Infos utiles (accès, portail…)"></textarea>
    <button class="btn primary" onclick="submitForm()">📩 Envoyer</button>
    <button class="btn secondary" onclick="prevStep()">Retour</button>
  </div>

  <script>
 let currentStep = 0;
const totalSteps = 7; // step0 → step7 inclus

function updateProgress() {
  document.getElementById("progressBar").style.width =
    (currentStep / totalSteps * 100) + "%";
}

function showStep(n) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  const stepEl = document.getElementById("step" + n);
  if (stepEl) {
    stepEl.classList.add("active");
    currentStep = n;
    updateProgress();
  }
}

function nextStep() {
  if (currentStep < totalSteps) {
    showStep(currentStep + 1);
  }
}

function prevStep() {
  if (currentStep > 0) {
    showStep(currentStep - 1);
  }
}

    // pill gps
    function setPill(v){
      document.getElementById("pill-oui").classList.toggle("active",v==="oui");
      document.getElementById("pill-non").classList.toggle("active",v==="non");
      if(v==="oui"){ document.getElementById("blocMap").style.display="block"; document.getElementById("blocLien").style.display="none"; }
      else{ document.getElementById("blocMap").style.display="none"; document.getElementById("blocLien").style.display="block"; }
    }
    function setAccess(v){
      document.getElementById("pill-acces-oui").classList.toggle("active",v==="oui");
      document.getElementById("pill-acces-non").classList.toggle("active",v==="non");
      if(v==="oui"){ document.getElementById("blocAccess").style.display="block"; }
      else{ document.getElementById("blocAccess").style.display="none"; }
    }

    // soumission
    function submitForm(){
      let demandeur=document.getElementById("demandeur").value.trim();
      let poste=document.getElementById("poste").value.trim();
      let appareil=document.getElementById("appareil").value.trim();
      if(!demandeur||!poste||!appareil){alert("⚠️ Merci de remplir tous les champs obligatoires.");return;}

      let infos=document.getElementById("infos").value.trim();
      let subject=`Contribution : ajout appareil ${poste}`;
      let body=`Demandeur : ${demandeur}\nPoste : ${poste}\nSAT : ${document.getElementById("sat").value.trim()}\nAppareil : ${appareil}\nInfos : ${infos}`;
      location.href=`mailto:arnaud.debaecker@sncf.fr?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      alert("L’email est généré, merci de l’envoyer.");
    }
  </script>
</body>
</html>

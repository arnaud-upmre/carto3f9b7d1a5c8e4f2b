<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Beta RSS</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .inline-links { display: flex; gap: 10px; margin-top: 6px; }
    .btn-primary {
      padding: 6px 12px;
      border: 1px solid #1a73e8;
      border-radius: 6px;
      background: #f5f9ff;
      color: #1a73e8;
      cursor: pointer;
    }
    .btn-primary:hover { background: #1a73e8; color: #fff; }
  </style>
</head>
<body>

<h2>Bloc RSS de test</h2>
<div id="rss-container"></div>
<br>
<button id="edit-toggle" class="btn-primary">[modifier]</button>
<button id="save-toggle" class="btn-primary" style="display:none;">💾 Sauvegarder</button>

<script>
let currentItem = { rss: "A" };  // Valeur initiale
let editMode = false;

// --- Fonction pour formater le RSS ---
function formatRSS(table, showPhones = true) {
  const tables = {
    A: ["03 28 55 82 56", "03 28 55 82 57"],
    B: ["03 28 55 82 58", "03 28 55 82 59"],
    C: ["03 28 55 82 53", "03 28 55 82 54"]
  };
  const tableNum = { A: "1", B: "2", C: "3" };

  if (!tables[table]) return `<div class="rss-block"><p><strong>📞 RSS :</strong> ${table}</p></div>`;

  let html = `<div class="rss-block">
      <p><strong><span id="editable-rss">📞 RSS Table ${tableNum[table]}</span></strong></p>`;
  if (showPhones) {
    const nums = tables[table].map(n =>
      `<a href="tel:${n.replace(/\s+/g,'')}">${n}</a>`).join(" ");
    html += `<div class="inline-links">${nums}</div>`;
  }
  html += `</div>`;
  return html;
}

// --- Fonction pour afficher le bloc normal ---
function renderRSS() {
  const cont = document.getElementById("rss-container");
  cont.innerHTML = formatRSS(currentItem.rss, true);
}

// --- Mode édition : affiche 3 boutons ---
function editRSS() {
  const cont = document.getElementById("rss-container");
  cont.innerHTML = `
    <div class="rss-block" id="editable-rss">
      <div class="inline-links">
        <button class="btn-primary btn-rss" data-code="A">Table 1</button>
        <button class="btn-primary btn-rss" data-code="B">Table 2</button>
        <button class="btn-primary btn-rss" data-code="C">Table 3</button>
      </div>
    </div>
  `;
  document.querySelectorAll(".btn-rss").forEach(btn => {
    btn.addEventListener("click", () => {
      const code = btn.dataset.code;
      currentItem.rss = code;
      // affiche sans numéros pendant l’édition
      cont.innerHTML = formatRSS(code, false);
    });
  });
}

// --- Toggle édition ---
document.getElementById("edit-toggle").addEventListener("click", () => {
  if (!editMode) {
    editMode = true;
    editRSS();
    document.getElementById("save-toggle").style.display = "inline-block";
  }
});

// --- Sauvegarde : revient à l’affichage normal avec numéros ---
document.getElementById("save-toggle").addEventListener("click", () => {
  editMode = false;
  renderRSS();
  document.getElementById("save-toggle").style.display = "none";
});

// Initial
renderRSS();
</script>

</body>
</html>

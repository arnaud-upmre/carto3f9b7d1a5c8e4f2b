<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Nono Maps – Google Maps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    html, body { height:100%; margin:0; padding:0; background:#0b0c0e; }
    #map { width:100%; height:100%; }

    /* Popups */
    .gm-style .gm-style-iw-c {
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .gm-style .gm-style-iw-t::after { background: rgba(255,255,255,0.9); }

    .popup-content {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      color: #111;
      max-width: 240px;
    }
    .popup-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .popup-btn {
      display:flex;align-items:center;justify-content:center;gap:6px;
      background:#007aff;color:#fff;padding:10px 14px;border-radius:8px;
      text-decoration:none;width:100%;font-size:15px;font-weight:500;
      margin-top:10px;
    }

    /* Boutons custom */
    .btn-toggle {
      background: rgba(0,0,0,.7);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 50%;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      color: #fff;
      cursor: pointer;
      margin: 8px;
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
      user-select: none;
    }
    .btn-toggle.active { background:#fff; color:#111; }

    #video-overlay {
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.7);z-index:10000;
      display:none;align-items:center;justify-content:center;
    }
    #video-overlay iframe { width:90%;max-width:800px;height:70%; }
    #video-close {
      position:absolute;top:8px;right:8px;font-size:24px;
      background:#000;color:#fff;border:none;border-radius:50%;
      width:40px;height:40px;cursor:pointer;
    }

    #version-label {
      position: fixed;
      bottom: 6px;
      left: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Overlay vidéo -->
  <div id="video-overlay">
    <button id="video-close">❌</button>
    <iframe id="video-frame" src="" frameborder="0" allowfullscreen></iframe>
  </div>

  <div id="version-label">Nono Maps v1 Google</div>

  <!-- Google Maps -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
  <script>
    let map;
    let allMarkers = [];
    let editMode = false;
    let sequence = [];
    let sequenceTime = 0;
    let editInfoWindow;

    function initMap() {
      const defaultCenter = { lat: 49.8, lng: 2.5 };

      map = new google.maps.Map(document.getElementById("map"), {
        center: defaultCenter,
        zoom: 8,
        mapTypeId: "roadmap",
        streetViewControl: true,
        fullscreenControl: true,
      });

      // Boutons custom
      addCustomControls();

      // Charger postes et appareils
      loadPostes();
      loadAppareils();

      // Mode édition
      map.addListener("click", (e) => {
        if (!editMode) return;
        showEditPopup(e.latLng);
      });

      document.addEventListener("keydown", handleEditShortcut);
    }

    function addCustomControls() {
      const controlsDiv = document.createElement("div");

      const btnBack = document.createElement("div");
      btnBack.className = "btn-toggle";
      btnBack.innerHTML = "🔍";
      btnBack.title = "Retour accueil";
      btnBack.onclick = () => window.location.href = "index.html";
      controlsDiv.appendChild(btnBack);

      const btnCenter = document.createElement("div");
      btnCenter.className = "btn-toggle";
      btnCenter.innerHTML = "🎯";
      btnCenter.onclick = () => {
        map.setCenter({ lat: 49.8, lng: 2.5 });
        map.setZoom(8);
      };
      controlsDiv.appendChild(btnCenter);

      const btnLocate = document.createElement("div");
      btnLocate.className = "btn-toggle";
      btnLocate.innerHTML = "📍";
      btnLocate.onclick = () => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            map.setCenter(loc);
            map.setZoom(15);
            new google.maps.Marker({ position: loc, map, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor:"#3b82f6", fillOpacity:0.6, strokeWeight:2, strokeColor:"#3b82f6" } });
          });
        }
      };
      controlsDiv.appendChild(btnLocate);

      map.controls[google.maps.ControlPosition.LEFT_TOP].push(controlsDiv);
    }

    function loadPostes() {
      fetch("postes.json")
        .then(r => r.json())
        .then(data => {
          const markers = data.map(item => {
            if (!item.poste_latitude || !item.poste_longitude) return null;

            const pos = { lat: parseFloat(item.poste_latitude), lng: parseFloat(item.poste_longitude) };
            const icon = { url: "ico/poste.png", scaledSize: new google.maps.Size(40, 40) };

            const content = `
              <div class="popup-content">
                <div class="popup-title">📍 ${item.nom || "Sans nom"} ${item.type || ""} ${item.SAT || ""}</div>
                🚄 PK <strong>${item.pk || "-"}</strong> sur la ligne <strong>${item.numero_ligne || "-"}</strong><br>
                ✍🏻 <strong>Information :</strong> ${renderPortail(item.description)}<br>
                📞 <strong>Contact :</strong> ${renderContact(item.contact)}<br>
                🔑 <strong>Portail :</strong> ${renderPortail(item.portail)}<br>
                <a href="index.html?id=${encodeURIComponent(item.nom || "")}" class="popup-btn">➕ Voir plus</a>
              </div>`;

            const marker = new google.maps.Marker({
              position: pos,
              map,
              icon,
              title: item.nom || "Poste",
            });

            const iw = new google.maps.InfoWindow({ content });
            marker.addListener("click", () => iw.open(map, marker));

            return marker;
          }).filter(Boolean);

          allMarkers.push(...markers);
          new markerClusterer.MarkerClusterer({ map, markers });
        });
    }

    function loadAppareils() {
      fetch("appareils.json")
        .then(r => r.json())
        .then(data => {
          const markers = data.map(item => {
            if (!item.latitude || !item.longitude) return null;

            const pos = { lat: item.latitude, lng: item.longitude };
            const iconFile = getAppareilIcon(item.appareil || "");
            const icon = { url: "ico/" + iconFile, scaledSize: new google.maps.Size(28, 28) };

            const content = `
              <div class="popup-content">
                <div class="popup-title">⚡ ${item.appareil || "Sans ref"}</div>
                ${item.description ? "✍🏻 <strong>Info :</strong> " + item.description : ""}
                <a href="index.html?id=${encodeURIComponent(item.appareil || "")}" class="popup-btn">➕ Voir plus</a>
              </div>`;

            const marker = new google.maps.Marker({ position: pos, map, icon, title: item.appareil || "Appareil" });

            const iw = new google.maps.InfoWindow({ content });
            marker.addListener("click", () => iw.open(map, marker));

            return marker;
          }).filter(Boolean);

          allMarkers.push(...markers);
          new markerClusterer.MarkerClusterer({ map, markers });
        });
    }

    function getAppareilIcon(ref) {
      ref = ref.toUpperCase();
      if (ref.startsWith("I") || ref.startsWith("SI") || ref.startsWith("D")) return "int.png";
      if (ref.startsWith("TT") || ref.startsWith("TSA") || ref.startsWith("TC") || ref.startsWith("TRA")) return "TT.png";
      if (/^[0-9]/.test(ref) || ref.startsWith("S") || ref.startsWith("ST") || ref.startsWith("F") || ref.startsWith("P") || ref.startsWith("FB") || ref.startsWith("B")) return "sect.png";
      if (ref.startsWith("ALIM")) return "alim.png";
      if (ref.startsWith("DU")) return "stop.png";
      return "sect.png";
    }

    // --- Mode édition ---
    function handleEditShortcut(e) {
      const key = e.key.toLowerCase();
      const now = Date.now();
      if (now - sequenceTime > 1000) sequence = [];
      sequence.push(key); sequenceTime = now;
      if (sequence.length > 3) sequence.shift();

      if (sequence.join("") === "edi") {
        editMode = !editMode;
        alert(editMode ? "✏️ Mode édition activé" : "❌ Mode édition désactivé");
        sequence = [];
      }
      if (e.key === "Escape" && editMode) {
        editMode = false;
        alert("❌ Mode édition désactivé");
      }
    }

    function showEditPopup(latLng) {
      const lat = latLng.lat().toFixed(5);
      const lng = latLng.lng().toFixed(5);
      const text = `"latitude": ${lat}, "longitude": ${lng}`;
      const html = `
        <div style="font-family:system-ui;font-size:13px;">
          📍 Coordonnées : ${text}<br><br>
          <button onclick="navigator.clipboard.writeText('${text}');alert('✅ Copié');">Copier</button>
        </div>`;
      if (editInfoWindow) editInfoWindow.close();
      editInfoWindow = new google.maps.InfoWindow({ content: html, position: latLng });
      editInfoWindow.open(map);
    }

    // --- Helpers ---
    function renderPortail(value) {
      if (!value) return "<i style='color:#777'>Non renseigné</i>";
      const str = String(value);
      const yt = str.match(/(?:youtube\.com\/.*v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
      if (yt) return `<a href="#" class="open-video" data-video="${yt[1]}">Voir vidéo explicative ICI</a>`;
      const url = str.match(/https?:\/\/[^\s]+/);
      if (url) return `<a href="${url[0]}" target="_blank">Lien portail</a>`;
      return str;
    }

    function renderContact(value) {
      if (!value) return "<i style='color:#777'>Non renseigné</i>";
      return value.replace(/(\d{2}(?:\s?\d{2}){4})/g, '<a href="tel:$1">$1</a>');
    }

    // --- Overlay vidéo ---
    document.addEventListener("click", e => {
      if (e.target.classList.contains("open-video")) {
        e.preventDefault();
        const videoId = e.target.dataset.video;
        document.getElementById("video-frame").src = `https://www.youtube.com/embed/${videoId}`;
        document.getElementById("video-overlay").style.display = "flex";
      }
    });
    document.getElementById("video-close").onclick = () => {
      document.getElementById("video-overlay").style.display = "none";
      document.getElementById("video-frame").src = "";
    };
  </script>

  <!-- Google Maps API -->
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDe7lEGbcqztNmgpqfd7jm5qbq5Z4MG8Wg&callback=initMap"></script>
</body>
</html>

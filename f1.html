<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>➕ Ajouter un appareil</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    body{font-family:Inter,system-ui;background:#f9f9f9;margin:0;padding:20px}
    form{max-width:600px;margin:auto;background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
    label{display:block;margin-top:12px;font-weight:600}
    input,select,textarea{width:100%;padding:8px;margin-top:4px;border:1px solid #ccc;border-radius:6px;font-size:15px}
    textarea{resize:vertical;min-height:60px}
    .radio-group{margin:8px 0}
    #map{height:250px;margin-top:10px;display:none;border-radius:8px}
    button{margin-top:16px;padding:10px 16px;font-size:16px;border:none;border-radius:8px;cursor:pointer;background:#0066cc;color:white}
    button:hover{background:#004a99}
  </style>
</head>
<body>
  <h2>➕ Ajouter un appareil</h2>
  <form id="appareilForm">
    <label>Demandeur</label>
    <input type="text" name="demandeur" required>

    <label>Poste (lié)</label>
    <input type="text" name="poste" value="Alleux SP" readonly>

    <label>Sélection SAT ou Poste</label>
    <select name="sat">
      <option value="Poste">Poste</option>
      <option value="SAT1">SAT1</option>
      <option value="SAT2">SAT2</option>
      <option value="SAT3">SAT3</option>
    </select>

    <label>Nom de l’appareil</label>
    <input type="text" name="appareil" placeholder="Ex : I7112" required>

    <label>Êtes-vous devant l’appareil ?</label>
    <div class="radio-group">
      <input type="radio" name="present" value="oui" id="present-oui">
      <label for="present-oui">Oui</label>
      <input type="radio" name="present" value="non" id="present-non">
      <label for="present-non">Non</label>
    </div>

    <div id="map"></div>

    <div id="coordsFields" style="display:none;">
      <label>Latitude</label>
      <input type="text" id="lat" name="latitude">
      <label>Longitude</label>
      <input type="text" id="lon" name="longitude">
    </div>

    <div id="lienField" style="display:none;">
      <label>Coller le lien Google Maps</label>
      <input type="url" name="lien">
    </div>

    <label>Infos libres</label>
    <textarea name="infos" placeholder="Notes utiles, accès difficile, état de l’appareil…"></textarea>

    <label>Photo (optionnelle)</label>
    <input type="file" name="photo" accept="image/*" capture="environment">

    <button type="submit">📩 Envoyer</button>
  </form>

  <script>
    const mapDiv = document.getElementById("map");
    let map, marker;

    document.getElementById("present-oui").addEventListener("change", () => {
      mapDiv.style.display = "block";
      document.getElementById("coordsFields").style.display = "block";
      document.getElementById("lienField").style.display = "none";
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          initMap(lat, lon);
        }, () => {
          alert("Impossible d’obtenir votre position, entrez manuellement.");
        }, {enableHighAccuracy:true});
      }
    });

    document.getElementById("present-non").addEventListener("change", () => {
      mapDiv.style.display = "none";
      document.getElementById("coordsFields").style.display = "none";
      document.getElementById("lienField").style.display = "block";
    });

    function initMap(lat, lon){
      document.getElementById("lat").value = lat.toFixed(6);
      document.getElementById("lon").value = lon.toFixed(6);
      if(!map){
        map = L.map("map").setView([lat, lon], 18);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap"
        }).addTo(map);
        marker = L.marker([lat, lon], {draggable:true}).addTo(map);
        marker.on("dragend", e=>{
          const pos = e.target.getLatLng();
          document.getElementById("lat").value = pos.lat.toFixed(6);
          document.getElementById("lon").value = pos.lng.toFixed(6);
        });
      }else{
        map.setView([lat, lon], 18);
        marker.setLatLng([lat, lon]);
      }
    }

    document.getElementById("appareilForm").addEventListener("submit", e=>{
      e.preventDefault();
      alert("Formulaire soumis (exemple) – à connecter à ton Google Sheets ensuite.");
    });
  </script>
</body>
</html>
